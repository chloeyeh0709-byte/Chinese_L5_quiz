<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="刷題系統">
<meta name="theme-color" content="#0d0d1a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>刷題系統</title>
<style>
:root {
  --bg: #0d0d1a;
  --surface: #13132a;
  --card: #1a1a35;
  --border: #2a2a4a;
  --accent: #7c6af7;
  --accent2: #e94560;
  --text: #e8e8f0;
  --text-dim: #7070a0;
  --green-bg: #0d2b1a;
  --green: #22c55e;
  --red-bg: #2b0d1a;
  --red: #ef4444;
  --font: 'Georgia', 'Noto Serif TC', serif;
  --ui: system-ui, -apple-system, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--ui); overscroll-behavior: none; }

#home { min-height: 100vh; padding: 48px 20px 32px; max-width: 480px; margin: 0 auto; }
.home-logo { text-align: center; margin-bottom: 32px; }
.home-logo-icon { font-size: 2.4rem; }
.home-title { font-family: var(--font); font-size: 1.5rem; font-weight: normal; color: var(--text); margin-top: 8px; letter-spacing: .05em; }
.home-subject { font-size: 0.75rem; color: var(--text-dim); margin-top: 4px; letter-spacing: .1em; text-transform: uppercase; }
.subject-section { margin-bottom: 32px; }
.subject-label { font-size: 0.7rem; color: var(--text-dim); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 12px; padding-left: 4px; }
.section-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 18px 18px 14px;
  margin-bottom: 10px; cursor: pointer;
  transition: transform .15s, border-color .2s;
  position: relative; overflow: hidden;
}
.section-card::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(124,106,247,.08) 0%, transparent 60%);
  pointer-events: none;
}
.section-card:active { transform: scale(.98); }
.section-card:nth-child(2) { border-color: #2a3a2a; }
.section-card:nth-child(2)::after { background: linear-gradient(135deg, rgba(34,197,94,.06) 0%, transparent 60%); }
.section-card:nth-child(3) { border-color: #2a2a3a; }
.section-card:nth-child(3)::after { background: linear-gradient(135deg, rgba(56,189,248,.06) 0%, transparent 60%); }
.section-card:nth-child(4) { border-color: #3a2a3a; }
.section-card:nth-child(4)::after { background: linear-gradient(135deg, rgba(232,121,249,.06) 0%, transparent 60%); }
.card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.card-name { font-size: .95rem; font-weight: 600; }
.card-badge { font-size: .72rem; color: var(--text-dim); background: var(--surface); padding: 3px 9px; border-radius: 99px; border: 1px solid var(--border); }
.pbar-wrap { height: 3px; background: var(--border); border-radius: 99px; margin-bottom: 7px; }
.pbar { height: 3px; border-radius: 99px; background: var(--accent); transition: width .5s; }
.section-card:nth-child(2) .pbar { background: var(--green); }
.section-card:nth-child(3) .pbar { background: #38bdf8; }
.section-card:nth-child(4) .pbar { background: #e879f9; }
.card-foot { font-size: .72rem; color: var(--text-dim); }
.card-foot.has-progress { color: var(--accent); }
.clear-btn {
  display: block; width: 100%; padding: 12px;
  background: none; border: 1px solid var(--border);
  color: var(--text-dim); border-radius: 10px;
  font-size: .8rem; font-family: var(--ui);
  cursor: pointer; margin-top: 8px;
}
.clear-btn:active { border-color: var(--accent2); color: var(--text); }

/* RESUME BANNER */
.resume-banner {
  background: var(--surface); border: 1px solid var(--accent);
  border-radius: 12px; padding: 14px 16px;
  margin-bottom: 16px; cursor: pointer;
  display: none;
}
.resume-banner.show { display: block; }
.resume-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.resume-label { font-size: .8rem; color: var(--accent); font-weight: 600; }
.resume-dismiss { font-size: .75rem; color: var(--text-dim); }
.resume-text { font-size: .82rem; color: var(--text-dim); }

#quiz { display: none; min-height: 100vh; max-width: 480px; margin: 0 auto; }
.quiz-header {
  position: sticky; top: 0; z-index: 10;
  background: rgba(13,13,26,.92);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px 8px;
}
.quiz-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.back-btn {
  background: none; border: none; color: var(--text-dim);
  font-size: .85rem; font-family: var(--ui);
  cursor: pointer; padding: 4px 0; display: flex; align-items: center; gap: 4px;
}
.back-btn:active { color: var(--text); }
.quiz-label { flex: 1; text-align: right; font-size: .75rem; color: var(--text-dim); }
.quiz-score { font-size: .82rem; color: var(--text); font-weight: 600; }
.qpbar-wrap { height: 3px; background: var(--border); border-radius: 99px; }
.qpbar { height: 3px; border-radius: 99px; background: var(--accent); transition: width .3s; }

.passage-box {
  margin: 14px 16px 0;
  background: var(--surface); border-left: 3px solid var(--accent);
  border-radius: 0 10px 10px 0; padding: 12px 14px;
  font-size: .84rem; line-height: 1.85; color: #a0a0c8;
  white-space: pre-wrap; word-break: break-all;
}

.q-card { padding: 14px 16px 24px; }
.q-num { font-size: .72rem; color: var(--text-dim); margin-bottom: 6px; }
.q-stem {
  font-size: .95rem; line-height: 1.8; color: #1a1a2e;
  background: #f0eff8; border-radius: 10px;
  padding: 14px 15px; margin-bottom: 14px;
  white-space: pre-wrap; word-break: break-all;
}
.opts { display: flex; flex-direction: column; gap: 8px; }
.opt-btn {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 12px 14px;
  font-size: .88rem; font-family: var(--ui); color: var(--text);
  text-align: left; cursor: pointer; line-height: 1.6;
  white-space: pre-wrap; word-break: break-all;
  transition: border-color .15s, background .15s;
}
.opt-btn:active:not(:disabled) { background: var(--surface); }
.opt-btn.correct { background: var(--green-bg); border-color: var(--green); color: #d1fae5; }
.opt-btn.wrong { background: var(--red-bg); border-color: var(--red); color: #fee2e2; }
.opt-btn.reveal { background: var(--green-bg); border-color: var(--green); color: #d1fae5; }
.opt-btn:disabled { cursor: default; }

.multi-hint { font-size: .72rem; color: var(--text-dim); margin-bottom: 8px; }
.opt-check {
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 12px 14px; cursor: pointer;
}
.opt-check.sel { border-color: var(--accent); background: var(--surface); }
.opt-check.correct { background: var(--green-bg); border-color: var(--green); color: #d1fae5; }
.opt-check.wrong { background: var(--red-bg); border-color: var(--red); color: #fee2e2; }
.opt-check.reveal { background: var(--green-bg); border-color: var(--green); color: #d1fae5; }
.opt-check input { width: 17px; height: 17px; margin-top: 1px; flex-shrink: 0; accent-color: var(--accent); }
.opt-check span { font-size: .88rem; line-height: 1.6; word-break: break-all; }
.confirm-btn {
  margin-top: 12px; width: 100%;
  background: var(--accent); border: none; color: #fff;
  padding: 13px; border-radius: 10px; font-size: .9rem;
  cursor: pointer; font-family: var(--ui); font-weight: 600;
}
.confirm-btn:active { opacity: .85; }

.feedback {
  margin-top: 12px; padding: 12px 14px;
  border-radius: 10px; font-size: .84rem; line-height: 1.65;
}
.feedback.ok { background: var(--green-bg); border: 1px solid rgba(34,197,94,.3); color: #bbf7d0; }
.feedback.ng { background: var(--red-bg); border: 1px solid rgba(239,68,68,.3); color: #fecaca; }
.fb-label { font-weight: 700; margin-bottom: 4px; font-size: .88rem; }
.fb-ans { font-size: .82rem; margin-top: 4px; opacity: .85; }
.fb-exp { margin-top: 8px; font-size: .8rem; opacity: .75; word-break: break-all; }

.next-btn {
  margin-top: 10px; width: 100%;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); padding: 13px; border-radius: 10px;
  font-size: .9rem; cursor: pointer; font-family: var(--ui);
}
.next-btn:active { background: var(--accent); border-color: var(--accent); }

#result { display: none; padding: 48px 20px 40px; max-width: 480px; margin: 0 auto; text-align: center; }
.res-title { font-family: var(--font); font-size: 1.6rem; margin-bottom: 4px; }
.res-sub { font-size: .8rem; color: var(--text-dim); margin-bottom: 32px; }
.donut { position: relative; width: 150px; height: 150px; margin: 0 auto 28px; }
.donut svg { transform: rotate(-90deg); }
.donut-pct { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 1.8rem; font-weight: 700; }
.stats { display: flex; gap: 10px; justify-content: center; margin-bottom: 28px; }
.stat { background: var(--card); border-radius: 12px; padding: 14px 18px; flex: 1; }
.stat-n { font-size: 1.6rem; font-weight: 700; }
.stat-n.g { color: var(--green); }
.stat-n.r { color: var(--red); }
.stat-l { font-size: .72rem; color: var(--text-dim); margin-top: 2px; }
.wrong-section { text-align: left; margin-bottom: 28px; }
.wrong-hd { font-size: .78rem; color: var(--text-dim); margin-bottom: 10px; }
.wrong-item {
  background: var(--card); border-radius: 8px;
  padding: 9px 12px; margin-bottom: 6px;
  font-size: .8rem; color: var(--text-dim); line-height: 1.5;
}
.wrong-item strong { color: var(--text); }
.res-btns { display: flex; flex-direction: column; gap: 9px; }
.res-btn {
  padding: 14px; border-radius: 10px;
  font-size: .9rem; cursor: pointer; font-family: var(--ui); border: none; font-weight: 600;
}
.res-btn.p { background: var(--accent); color: #fff; }
.res-btn.s { background: var(--card); color: var(--text); border: 1px solid var(--border); font-weight: normal; }
.res-btn:active { opacity: .85; }
</style>
</head>
<body>

<div id="home">
  <div class="home-logo">
    <div class="home-logo-icon">📚</div>
    <div class="home-title">刷題系統</div>
    <div class="home-subject">Chloe's Study App</div>
  </div>

  <div id="resumeBanner" class="resume-banner" onclick="resumeSession()">
    <div class="resume-top">
      <div class="resume-label">⚡ 繼續上次進度</div>
      <div class="resume-dismiss" onclick="dismissResume(event)">✕</div>
    </div>
    <div class="resume-text" id="resumeText"></div>
  </div>

  <div class="subject-section">
    <div class="subject-label">114學年度第二學期・普高國文 L5</div>
    <div class="section-card" onclick="startSection(1)">
      <div class="card-top"><div class="card-name">一、單選題</div><div class="card-badge">142 題</div></div>
      <div class="pbar-wrap"><div class="pbar" id="pb1" style="width:0%"></div></div>
      <div class="card-foot" id="pt1">尚未開始</div>
    </div>
    <div class="section-card" onclick="startSection(2)">
      <div class="card-top"><div class="card-name">二、單選閱讀題組</div><div class="card-badge">47 小題</div></div>
      <div class="pbar-wrap"><div class="pbar" id="pb2" style="width:0%"></div></div>
      <div class="card-foot" id="pt2">尚未開始</div>
    </div>
    <div class="section-card" onclick="startSection(3)">
      <div class="card-top"><div class="card-name">三、多選題</div><div class="card-badge">81 題</div></div>
      <div class="pbar-wrap"><div class="pbar" id="pb3" style="width:0%"></div></div>
      <div class="card-foot" id="pt3">尚未開始</div>
    </div>
    <div class="section-card" onclick="startSection(4)">
      <div class="card-top"><div class="card-name">四、多選閱讀題組</div><div class="card-badge">10 小題</div></div>
      <div class="pbar-wrap"><div class="pbar" id="pb4" style="width:0%"></div></div>
      <div class="card-foot" id="pt4">尚未開始</div>
    </div>
  </div>
  <button class="clear-btn" onclick="clearAll()">清除所有進度</button>
</div>

<div id="quiz">
  <div class="quiz-header">
    <div class="quiz-nav">
      <button class="back-btn" onclick="goHome()">← 返回</button>
      <span class="quiz-label" id="qLabel"></span>
      <span class="quiz-score" id="qScore"></span>
    </div>
    <div class="qpbar-wrap"><div class="qpbar" id="qpbar" style="width:0%"></div></div>
  </div>
  <div id="qBody"></div>
</div>

<div id="result">
  <div class="res-title">練習完成</div>
  <div class="res-sub" id="resSub"></div>
  <div class="donut">
    <svg width="150" height="150" viewBox="0 0 150 150">
      <circle cx="75" cy="75" r="58" fill="none" stroke="#1a1a35" stroke-width="16"/>
      <circle cx="75" cy="75" r="58" fill="none" stroke="#7c6af7" stroke-width="16"
        stroke-dasharray="364" stroke-dashoffset="364" id="donutC" stroke-linecap="round"/>
    </svg>
    <div class="donut-pct" id="donutPct"></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-n g" id="sCorrect">0</div><div class="stat-l">答對</div></div>
    <div class="stat"><div class="stat-n r" id="sWrong">0</div><div class="stat-l">答錯</div></div>
    <div class="stat"><div class="stat-n" id="sTotal">0</div><div class="stat-l">總題</div></div>
  </div>
  <div class="wrong-section">
    <div class="wrong-hd">錯題清單</div>
    <div id="wrongBody"></div>
  </div>
  <div class="res-btns">
    <button class="res-btn p" onclick="retryWrong()">重練錯題</button>
    <button class="res-btn s" onclick="restartSection()">重新開始本節</button>
    <button class="res-btn s" onclick="goHome()">返回首頁</button>
  </div>
</div>

<script>

疏鬢已斑。何因不歸去， 淮上有秋山"},"answer":"B","explanation":"(A)首句的平仄符合近體詩的格律；而且頷聯和頸聯對仗工 整。綜合以上分析，自平仄格律與對仗工整與否可以確定是律 詩。出自杜甫〈月夜憶舍弟〉 。(B)古體詩與近體詩主要的差別 在韻腳與平仄格律。古體詩用韻與平仄較自由；近體詩大都押 平聲韻，平仄有固定格式，若是律詩，中間兩聯必須對仗。從 韻腳分析，其餘三首詩押平聲韻，僅此首選項押仄聲韻。出自 韋應物〈長安遇馮著〉 。(C)首句的平仄符合近體詩的格律；而 且頷聯和頸聯對仗工整，可以確定是律詩。出自王維〈山居秋 暝〉 。(D)首句的平仄符合近體詩的格律；而且頷聯和頸聯對仗 工整，可以確定是律詩。出自韋應物〈淮上喜會梁川故人〉 。","num":109},{"stem":"下列有關古體詩的發展與成就，何者敘述正確？","options":{"A":"古詩原為唐人對漢、魏、六朝詩歌的通稱，為了與唐以後的新 樂府區別才有「古體詩」一名","B":"陶淵明開創了山水詩一體， 詩風質樸，被稱為「古今隱逸詩人之宗」","C":"左思的〈詠史〉 八首為詠史詩之祖，其詩筆力雄健，奠定詠史抒懷的寫作模式","D":"李白在古詩的創作上有極高的成就，其詩充滿浪漫色彩"},"answer":"D","explanation":"(A)「古體詩」一名是為了與唐以後興起的「近體詩」作區別。 58 / 198 (B)陶淵明開創的是田園詩。(C)詠史詩最早起於東漢班固，建 安時期的曹植、王粲也有詠史之作。左思的貢獻在於他打破了 傳統詠史詩的寫法，開啟「名為詠史，實為抒懷」的先河。","num":110},{"stem":"下表為樂府詩與古詩的比較，說明正確的選項是： 選項 樂府詩 古詩 （甲）用韻 無限制 須一韻到底 （乙）性質 多文人作品，入樂 多民間作品，不入樂 （丙）句式 句式嚴整，多五、七言 句式自由，多長短句 （丁）平仄 皆無特別限制","options":{"A":"（甲）","B":"（乙）","C":"（丙）","D":"（丁）"},"answer":"D","explanation":"(B)（乙） (C)（丙） (D)（丁） (A)用韻皆無特別限制，可換韻。(B)樂府詩多民間作品，入 樂；古詩多文人作品，不入樂。(C)樂府詩句式自由，多長短句； 古詩句式嚴整，多五、七言。","num":111},{"stem":"下列關於〈古詩十九首〉藝術特色的介紹，正確的選項 是： 〈古詩十九首〉始見於（甲） 《昭明文選》 ，各詩首句即為 作者所訂詩題。其藝術特色，主要表現在寫作手法上：詩人（乙） 善用疊字，增添音樂性及感染力，也（丙）大量運用「賦」的 手法表達情思，使詩句讀來清新而意味深長。此外，詩人也（丁） 善用借景抒情的手法，在抒情中以景物作為烘托，達到情景交 融的境地。總體來說，〈古詩十九首〉 （戊）語言質樸自然，情 感含蓄深遠，寫的是人生最基本的感情，卻蘊含深厚溫潤的情 感，極富普遍性和感染力。","options":{"A":"甲乙戊","B":"乙丙丁","C":"甲乙丙","D":"乙丁戊 (D)（甲）未著詩題，後以各詩首句為詩題。"},"answer":"D","explanation":"(D)（甲）未著詩題，後以各詩首句為詩題。 （丙）善於運用「比」 、 「興」（譬喻和聯想）的手法。「賦」指平鋪直敘的白描手法。","num":112},{"stem":"下列關於「樂府詩」與「古詩」的比較，何者錯誤？","options":{"A":"宋郭茂倩《樂府詩集》 ，總括歷代樂府歌辭，以音樂為主，分為 十二類","B":"二者為漢代詩歌文學的雙葩，皆成熟於東漢末年， 不拘平仄，用韻自由","C":"古詩多言情，尚溫雅，樂府詩多敘事， 貴遒勁，二者皆不強調「用典」與「藻飾」","D":"漢代樂府多為 官署所採集的各地民間歌謠，唐初樂府則多為士人仿作"},"answer":"B","explanation":"(B)樂府詩於西漢武帝時由官署採集入樂。古詩的成熟時期則 為東漢。","num":113},{"stem":"左思詩文遙承「建安風骨」 ，「建安風骨」是指漢末建安 時期三曹、七子等人的文學風格。建安文學的內容或反映社會 動亂，或抒發個人建功立業的抱負，格調蒼勁雄渾，情辭慷慨 悲涼，充滿昂揚進取之精神。請自以下詩文中找出符合此特色 描述的作品：","options":{"A":"京華遊俠窟，山林隱遯棲。朱門何足榮， 未若託蓬萊","B":"種苗在東皋，苗生滿阡陌。雖有荷鋤倦，濁酒 聊自適","C":"生年不滿百，常懷千歲憂。晝短苦夜長，何不秉燭 遊","D":"我有素餐責，誠愧〈伐檀〉人。雖無鉛刀用，庶幾奮薄 身"},"answer":"D","explanation":"(A)出自郭璞〈遊仙詩〉 。此詩在表達想遠離世俗，隱居仙境的 渴望。語譯：京師是遊俠之士聚居的地方，山林裡是隱居的人 棲身的場所。豪門權貴哪裡值得榮耀？還不如寄身於蓬萊那樣 的仙境。(B)出自江淹〈陶徵君潛‧田居〉 。此為江淹模擬陶淵 明田園詩之作。語譯：在田野上插種秧苗，秧苗長大佈滿田中。 雖然整天拿鋤頭很勞累，姑且喝杯自家所釀的酒自得其樂。(C) 詩中強調及時行樂。語譯：人生在世不能滿百歲，卻常為身後 種種而憂愁。日短夜長使人苦惱，何不舉著蠟燭整夜遊樂。(D) 出自王粲〈從軍詩〉 。詩中想要盡己身之力為國效命，並抒發 自身想為國盡忠的昂揚精神。語譯：我自己無功受祿，面對《詩 經‧伐檀》的作者會感到慚愧。雖然我的才能微薄，但還是要 為國貢獻我微薄的身軀。","num":114},{"stem":"下列（甲） （乙）二詩各屬不同詩體，以下針對其所屬體 例的說明，何者正確？ （甲）去者日以疏，生者日以親。出郭門直視，但見丘與墳。 古墓犁為田，松柏摧為薪。白楊多悲風，蕭蕭愁殺人。思還故 里閭，欲歸道無因。 （乙）空山新雨後，天氣晚來秋。明月松間照，清泉石上流。 竹喧歸浣女，蓮動下漁舟。隨意春方歇，王孫自可留。","options":{"A":"（甲）詩的體例發展，晚於（乙）詩","B":"（甲）詩所屬 的體例，要求詩中必定要有對偶句","C":"（乙）詩所屬的體例， 對用韻較（甲）詩所屬的體例寬鬆","D":"（甲）詩所屬的體例， 句數未有特別限制，"},"answer":"D","explanation":"(A)（甲）《古詩十九首•去者日已疏》。從其句數不限、不 強制對仗的形式來看，其可能為古詩或樂府。（乙）王維〈山居 秋暝〉。詩中用韻整齊，句子有八句，且中間兩聯整齊對仗，故 應該為五言律詩。故（甲）詩發展早於（乙）詩。(B)律詩才要 求中間兩聯對偶，古體則未限制。(C)古體用韻自由可換韻，近 體詩則一韻到底。(D)古體句數不限，而律詩基本上以八句為主。","num":115},{"stem":"心瑜在上國文課時，記下老師寫在黑板上關於《古詩十 九首》的重點，但她不慎將桌上的飲料打翻，造成筆記上部份 字跡因髒汙而難以辨認。請依據你對《古詩十九首》的瞭解， 判斷下列選項敘述，正確的是：","options":{"A":"(甲)宜填入「南朝梁昭明太子蕭統」","B":"(乙)宜填入「詩 中的歌詠對象」","C":"(丙)宜「填入諷刺官場黑暗、針砭時事」","D":"(丁)宜填入「五言古詩」"},"answer":"D","explanation":"(A)(甲)由「……的作品」可知，此處宜填入作者相關的敘述， 但《古詩十九首》非一人一時之作，故宜填入「東漢末年失意 文人們」 。(B)《古詩十九首》並非以詩中的歌詠對象為題，(乙) 宜填入「各詩的第一句」 。(C)《古詩十九首》的內容多以「遊 子懷鄉、夫妻朋友間的離愁別緒、士人的失志徬徨或生命無常 之感」為主。","num":116},{"stem":"下文是小春的課堂筆記，請幫他找出錯誤處並選出修改 正確的選項： 樂府詩與古詩二者並稱漢代文學的雙葩，①與近體詩不 同，二者皆不拘句數，也有十句以上的長詩，②押韻上，二者 平仄韻皆可押，但不可以換韻。二者的區別在於：樂府③多為 民間作品，可入樂，文詞具有民歌互相唱和的韻味，例如〈陌 上桑〉中，就以羅敷與使君對話的方式呈現故事；古詩則多④ 出自士大夫之手，句式多四言，可入樂，也可誦，收錄於《昭 明文選》的〈古詩十九首〉是其中的代表作品。","options":{"A":"①錯誤，雖不拘句數，但無超過十句的長詩 誤，平仄韻皆可押，且可以換韻 只可誦","B":"②錯","C":"③錯誤，樂府不可入樂，","D":"④錯誤，古詩多為民間作品，少有士大夫之作 ①正確，不須修改。③正確，不須修改。④錯誤，古詩多出 自士大夫之手，句式多五、七言，已不入樂，只可誦。"},"answer":"B","explanation":"(B)②錯 (C)③錯誤，樂府不可入樂， (D)④錯誤，古詩多為民間作品，少有士大夫之作 ①正確，不須修改。③正確，不須修改。④錯誤，古詩多出 63 / 198 自士大夫之手，句式多五、七言，已不入樂，只可誦。","num":117},{"stem":"在文章中使用「數字」，有分為「實指」與「虛指」，如 「生年不滿百，常懷千歲憂」中的「千歲」即是虛指，表示眾 多的意思。下列「 」中的數字，何者亦是「虛指」？ 政通人和， 「百」廢具興 者之為","options":{"A":"","B":"予嘗求古仁人之心，或異「二」","C":"「四」維不張，國乃滅亡", ":"上古時代的人們已有計時概念，並依賴水鐘來 區分時段"},"answer":"A","explanation":""},{"num":2,"stem":"根據文中內容，下列最適合作為本文註解的是： 時六十分鐘的定制是怎麼來的 好漫長","options":{"A":"一小","B":"白天不懂夜的黑，古人的黑夜","C":"生活在都市或鄉村，時間感大不同","D":"中古世紀人的 一天是這樣過的"},"answer":"A","explanation":""},{"num":3,"stem":"根據上文，請判斷以下各人物的時間表，符合其身處時代 背景對時間的感知的選項是： (甲) (乙) 古埃及人 中古世紀的修士 破曉 起床工作 夜的第12真時 誦讀日課 雞鳴 午餐 日的第1真時 晨禱 日中 返家 日的第2真時 進食 日落 休息 日的第3真時 勞動 (丙) (丁) 中世紀的農民","options":{"A":"甲"},"answer":"A","explanation":""}],"explanation":"( 1 ) (A)由文中可知，隨著文明進步，人們對於「精確時間」 的需求也增加，時間的概念劃分得更細，但並不表示人們都能有 效利用時間。(B)由「由於晝夜長短會隨著季節而變化，真時的 長度也因而不同」可知，當時每個小時長度並不一致。(D)由「上 古時代，人們透過觀測天體的運行變化……對於時間的變化多用 『雞鳴』 、 『日出』 、 『日落』等自然現象來判斷」可知，上古時代 的人們是從太陽的升降來感知時間，並無計時概念。 ( 2 ) (A) 文中主要提到從中古世紀到十三、十四世紀人們對時間的概念， 從日升日落、十二時辰最後演變到一小時六十分的標準時間。(B) 白晝和黑夜的長度會隨季節而改變，故古人的黑夜不一定都是漫 長的。(C)由上文可知，隨著文明演進，社會結構產生改變，人 們對於精確計時的需求逐漸提升，因而產生時間感受上的差異， 與居住地點並無關。(D)文中只能看到中古世紀人們對時間的認 知與現代不同，並未提及其生活模式。 ( 3 ) (A)由文中可知，古 埃及人已有「真時」的概念，他們按日、夜將時間各劃分至十二 等份，此表僅以太陽升降及雞鳴來區別時間，與古埃及人的認知 並不相符。(B)由文中可知，希臘人、羅馬人將古埃及日、夜各 劃分至十二等份的「真時制」傳至歐洲，故中世紀的修士也依此 計時、安排作息的時間，此表符合修士的認知。(C)文中提及農 民不需要精確的時間劃分，只需要從太陽升降和季節變化來判斷 時間，表中詳細記載了確切的作息時間及對應活動，並不符合農 民對時間的認知。(D)文中提及在十四世紀，一小時的長度逐漸 均等，但仍無法顯示比「時」還更小的「分」 、 「秒」單位，此表 顯示「分」的時間，並不符合十四世紀商人的認知。"},{"group_num":2,"passage":"閱讀下圖，並回答下列問題。 漢代詩歌簡介 甲文體 句式自由 多長短句 乙文體 可換韻 不分平仄 句式整齊 多五、七言 不限句數 遒勁、熱情 作者多來自民間 溫雅、含蓄 不求對仗 作者多為文人","subquestions":[{"num":1,"stem":"由上圖判斷，甲、乙分別為何種文體？ 古詩 (B)甲：古詩／乙：宮體詩","options":{"A":"甲：賦／乙：","C":"甲：樂府／乙：古詩","D":"甲：樂府／乙：賦"},"answer":"A","explanation":""},{"num":2,"stem":"此二種文體在文學史上出現的時間有間隔，且其中一者影 響另外一者的發展。已知文體的書寫模式依循以下規律變化：① 由簡到繁，②由自由到有規則。下列哪張圖最適合表達甲、乙兩 種文體的相互關係？","options":{"A":"","B":"","C":"","D":""},"answer":"AD","explanation":""}],"explanation":"( 1 ) (A)漢賦有分「騷體賦」 、 「漢大賦」 、 「抒情小賦」 ，抒情、 (2)B 說理皆有，作者多為文人。／古詩作者多為文人、句式整齊，多 五、七言，風格溫雅含蓄。(B)宮體詩是南朝梁前後才形成的詩 體，內容多描寫宮廷生活。(C)樂府句式自由，多長短句、風格 遒勁熱情，作者多來自民間。樂府與古詩皆可換韻、不分平仄、 不限句數、不求對仗。 ( 2 ) (A)(D)縱軸為作品累積數量，不應 隨著時間減少甚至歸零。(B)(C)依題幹提示，文體的發展流變是 由簡到繁、由自由到有規則，樂府詩發展於古詩之前，其句式影 響後來的古詩句式發展，古詩較樂府更為規律。故乙文體的累積 曲線應比甲文體的累積曲線更晚開始出現。"},{"group_num":3,"passage":"※閱讀甲、乙二文，並回答下列問題。 甲 生年不滿百，常懷千歲憂。 晝短苦夜長，何不秉燭遊？ 為樂當及時，何能待來茲？ 愚者愛惜費，但為後世嗤。 仙人王子喬，難可與等期！ 乙 〈生年不滿百〉勸人人生短促、無常，為樂應當及時。是故， 「『為 樂當及時』的『時』字，正是本詩的詩眼」 。因「時」遞移，感到人的 壽命短促，進而以「常懷」相對於「不滿」 ，感嘆在這麼短暫的人生中， 卻時常牽掛著「千歲憂」 ，為自己或為子孫的煩惱已超過「生年不滿百」 可承載，作者認為這樣實在是不值得。於是，提出「晝短苦夜長，何 不秉燭遊」的具體方法，說明人生苦短，又加上白晝短暫，是故，應 把握時間，秉燭夜遊，作者以「何不」字眼，作建議口吻，點出「為 樂當及時」的主題，再以「何能待來茲」反詰，加深及時行樂的重要 性，以「何能」一詞，強調人生短促、無常，對於生存的不安定感、 不知道能否有明日，道出當下時人對生命安置的焦慮。再者，以反例 「愚者愛惜費」 ，呼應首句「生年不滿百，常懷千歲憂」，這種「愛惜 費」 、「常懷千歲憂」正是當下時人的人生觀，也是今日到處可見，為 自己、後輩作打算的常態，作者卻道出「後世嗤」之嘆，對這種人生 觀作一當頭棒喝。此外，也對另一種追求成仙的人生觀，以「難可」 字眼作一反駁，也說明了人生短促的無奈。 人生本不滿百，難可與仙人同期，已有著許多無奈，又因常懷著 千歲之憂、惜費，使人生憂愁抑鬱。作者有感於人生短促，卻也多愁， 在時間推移的無奈和人生無常之下，主張「為樂當及時」 ，提出秉燭夜 遊的具體作法，以安置人類個體存在、解脫生命焦慮。(節錄自高雄師 範大學葉宛樺〈明、清詩話對《古詩十九首》的接受研究〉)","subquestions":[{"num":1,"stem":"下列詩句，可與甲文主旨相呼應的是： 夕露沾我衣。衣沾不足惜，但使願無違","options":{"A":"道狹草木長，","B":"雞鴨成群晚未收，桑 麻長過屋山頭。有何不可吾方羨，要底都無飽便休","C":"二月已破 三月來，漸老逢春能幾回。莫思身外無窮事，且盡生前有限杯","D":"秦時明月漢時關，萬里長征人未還。但使龍城飛將在，不教胡馬 度陰山"},"answer":"C","explanation":""},{"num":2,"stem":"下列人物面對生活的態度，與甲、乙二文所述最相近的是：","options":{"A":"小花：玩樂與金錢乃身外之物，認真過好每一天最實在 小白：妥善規劃與管理時間，就不必擔心被死線追著跑 煩惱與日俱增，倒不如趁早把酒言歡、盡興一場","B":"","C":"小志：","D":"小剛：從哪 裡跌倒就從哪裡站起來，那些失敗的經驗都是成功的養分"},"answer":"C","explanation":""},{"num":3,"stem":"閱讀甲、乙二文，下列①、②兩項敘述，推論最適當的是： ①甲文以積極且正向的態度勸人忘卻煩憂、及時行樂 ②以人生短促但煩憂無限營造氣氛，強化「為樂當即時」之主旨","options":{"A":"①、②皆正確","B":"①、②皆錯誤","C":"①正確、②錯誤","D":"① 錯誤、②正確"},"answer":"D","explanation":""}],"explanation":"( 1 ) (C)形容時光不待人，應及時行樂，把握美好。與甲文旨 (2)C (3)D 意相符。出自杜甫〈絕句漫興九首．其四〉 。語譯：二月已過三 月將至，逐漸老去的人還能有幾個春天？別去想那些想不盡的事 物，不如先將已不多的杯中物一飲而盡。(A)寫歸田後怡然自得 的舒適心境。出自陶淵明〈歸園田居．其三〉。語譯：草木叢生 而使道路變狹窄，晚間的露水把我的衣物都用溼了。但衣服溼不 溼都無所謂，我只願心意能不相違。(B)寫對農村生活的欣羨之 情。出自辛棄疾〈鷓鴣天〉 。語譯：成群的雞鴨傍晚還未歸窩， 茂盛的桑麻高過了屋頭。村居有何不可，我正羨慕，要在好吃好 睡，無欲無求。(D)寫征人久戍未歸之悲，表達對邊境安定的期 盼。出自王昌齡〈出塞〉 。語譯：如今看見的明月仍是秦漢那時 的明月，關塞也仍是秦漢那時的關塞，但古今遠行萬里征戰的壯 士們，至今仍沒有歸來。只要衛青、李廣這樣的良將還在，就不 會讓外族的兵馬越過陰山而來。 ( 2 ) (C)甲、乙二文認為人因壽 命短促而常懷憂愁，而主張「為樂當及時」 ，以解脫生命帶來的 焦慮與此選項的生活態度最相近。(A)二文皆未見玩樂為身外之 物一說。(B)二文皆未見管理時間一說。(D)二文皆未見「失敗為 成功之母」一說。 ( 3 ) (D)①錯誤。從乙文對甲文的分析中可見， 甲文多以「何能」 、 「何不」等字詞呈現對於時間流逝的不安定感 與無奈，認為人因壽命短促而常懷憂愁，而主張「為樂當及時」， 以解脫生命帶來的焦慮，甲文未見積極、正向的態度；②正確。 乙文寫到甲文善用對比，以人「生年不滿百」對照仙人的無窮壽 命，強化正因生命短暫，才應及時行樂。"},{"group_num":4,"passage":"閱讀下文，並回答下列問題。 長相思，在長安。絡緯秋啼金井闌，微霜淒淒簟色寒。孤燈不明 思欲絕，卷帷望月空長歎。美人如花隔雲端，上有青冥之長天，下有 淥水之波瀾。天長路遠魂飛苦，夢魂不到關山難。長相思，摧心肝。 （李 白〈長相思〉）","subquestions":[{"num":1,"stem":"本詩使用下列哪種寫作手法？ 第二人稱 (C)男性第一人稱","options":{"A":"女性第一人稱","B":"女性","D":"男性第二人稱"},"answer":"C","explanation":""},{"num":2,"stem":"此詩的寫作時間是在什麼時候？","options":{"A":"春夜","B":"夏夜","C":"秋夜","D":"冬夜"},"answer":"C","explanation":""}],"explanation":"( 1 ) (C)從「美人如花隔雲端」可看出是男性思念女方之作。 (2)C ( 2 ) (C)從「絡緯秋啼」可知為秋夜。 【語譯】我所思念的人兒，在長安。當秋天的蟋蟀在井邊啼叫的 時候，我獨自不寐，薄霜初降，冰冷地連竹席也生起了微寒。孤 燈黯淡，相思欲絕，我不禁捲起窗簾對著月兒長嘆。美人美如花， 彷彿就隔在雲端。上有青的、高遠的長天，下有微波蕩漾的清池。 這樣的天長路遠，更使人感到夢思魂牽，但這層層阻隔的關山可 難以飛度啊！我永遠地思念著你，那思念，真使我肝腸痛斷。"},{"group_num":5,"passage":"閱讀甲、乙二文，並回答下列問題。 甲 眾所周知，班固〈詠史〉為現存最早也最完整的五言古詩，記述 緹縈救父的過程，情節按事件發生的先後順序安排，結構簡單，內容 平舖直述，也因此在左思出現以前，詠史詩的內容大多偏重於歷史事 實或歷史人物的描繪。 一直到西晉左思八首〈詠史〉誕生，詠史詩不再僅限縮於歷史事 實的描述，更將自己的主觀情志融入於客觀書寫當中，也開始展現對 歷史事件的相關批判與關懷。左思〈詠史〉的出現，不僅開創了新的 詠史風格，更成為後代文人爭相仿作、學習的目標。(參考自宋俊賢〈兩 漢魏晉詠史詩研究〉 、許憶萍〈左思及其詠史詩研究〉) 乙 吾希段干木，偃息(１)藩(２)魏君。吾慕魯仲連，談笑卻秦軍。 當世貴不羈，遭難能解紛。功成恥受賞，高節卓不群。 臨組不肯紲，對珪寧肯分。連璽耀前庭，比之猶浮雲。（左思〈詠史〉 其三） 【注釋】(１)偃息：高臥。(２)藩：保衛。","subquestions":[{"num":1,"stem":"下列對於乙文文意的解讀，敘述正確的是：","options":{"A":"全詩以兩 位賢臣能相為引，表達對段干木跟魯仲連能為國效力的仰慕之情","B":"「遭難能解紛」是作者對自身的期許，表達能跳脫世間紛擾， 達逍遙之境","C":"「臨組不肯紲，對珪寧肯分」是指作者認為自己 所建功業不能與封賞匹配","D":"「連璽曜前庭，比之猶浮雲」可跟 「功成恥受賞，高節卓不群」相互呼應"},"answer":"A","explanation":""},{"num":2,"stem":"閱讀甲、乙二文，下列敘述正確的是：","options":{"A":"詠史詩歌詠史 事，漢朝時敘述技巧多元，尤以班固〈詠史〉為代表","B":"詠史詩 發展到魏晉南北朝時，著重華麗堆砌的詞藻，以此評論史事","C":"左思的詠史視角從關注史實轉向對「人」以及「生命」的境遇書 寫","D":"左思的詠史詩能透過主觀敘事、抒情的寫作手法，跳脫過 往的侷限"},"answer":"A","explanation":""},{"num":3,"stem":"閱讀甲、乙二文，以下詩作屬於左思的作品的是：","options":{"A":"世 胄躡高位，英俊沈下僚。地勢使之然，由來非一朝。金張籍舊業， 七葉珥漢貂。馮公豈不偉，白首不見招","B":"三王德彌薄，惟後用 肉刑。太倉令有罪，就逮長安城。自恨身無子，困急獨煢煢。小 女痛父言，死者不可生。上書詣闕下，思古歌〈雞鳴〉","C":"折戟 沉沙鐵未銷，自將磨洗認前朝。東風不與周郎便，銅雀春深鎖二 喬","D":"丞相祠堂何處尋？錦官城外柏森森。映階碧草自春色，隔 葉黃鸝空好音。三顧頻煩天下計，兩朝開濟老臣心"},"answer":"A","explanation":""}],"explanation":"( 1 ) (A)作者想表達的應為對於兩位前人明明立功，卻不要爵 (3)A 祿的高尚情操之敬慕。(B)「遭難能解紛」是對魯仲連的描述， 讚其身為天下之士而能為人排憂解紛。(C)「臨組不肯紲，對珪 寧肯分」是指建功立業之後，選擇功成身退，不接受任何賞賜。 ( 2 ) (A)由「在左思出現以前，詠史詩的內容大多偏重於歷史事實 或歷史人物的描繪」可知此選項為非。(B)文中並未特別提及詞 藻的堆砌與應用。(D)應為將主觀情志融入客觀書寫的寫作手法。 ( 3 ) (A)此詩感嘆門閥制度造成有才能但出身寒微的人只能屈居 下位，而世族子弟卻依靠門第的高貴占據高位，藉由詠史抒發自 身感懷。出自左思〈詠史．其二〉。語譯：世家子弟登高位，英 俊寒士做小官。地勢使它如此樣，由來已久莫驚訝。金張兩家門 第貴，七代在漢做高官。馮唐難道不傑出？到老卻不受重用。(B) 單純記緹縈救父一歷史故事。出自班固〈詠史〉 。語譯：夏商周 三代君王以後，道德逐漸衰落，只有在後世才出現肉體的刑罰。 擔任太倉令的淳于意因遭人誤解被告有罪，被遞解到長安。他感 嘆沒生兒子，危急之時只能孤單一人面對。淳于意的小女兒緹縈 痛心父親將受刑，人一旦死了就無法復生。於是向當今皇帝上 書，就像詩經〈雞鳴〉催促早起上朝一般，一早就等在宮廷門口 等待皇帝上朝。(C)記述火燒赤壁之役。出自杜牧〈赤壁〉 。語譯： 折斷的戟沉埋沙中，鐵製的部分至今仍未銷毀，我將它磨洗辨認 出是前朝的遺物。倘若東風不給周郎方便，恐怕東吳的二喬，早 就被曹操擄去，將她們深鎖在銅雀臺中，成為曹操的姬妾。(D) 記述諸葛亮相助劉備一事。出自杜甫〈蜀相〉。翻譯：丞相的祠 堂在哪裡呢？就在錦官城外柏樹繁茂的地方。綠草映著臺階，徒 自呈現出一片春色，黃鸝隔著濃密的樹葉，兀自唱出好聽的聲 音。當年劉備三顧茅廬，一次次地與他商量安定天下的大計，兩 代中間開國與輔佐，便全靠這"},{"group_num":6,"passage":"閱讀下文，並回答下列問題。 君不見黃河之水天上來，奔流到海不復回！ 君不見高堂明鏡悲白髮，朝如青絲暮成雪！ 人生得意須盡歡，莫使金樽空對月。 天生我材必有用，千金散盡還復來。 烹羊宰牛且為樂，會須一飲三百杯。 岑夫子、丹丘生，進酒君莫停。 與君歌一曲，請君為我傾耳聽。 鐘鼓饌玉不足貴，但願長醉不用醒。 古來聖賢皆寂寞，唯有飲者留其名。 陳王昔時宴平樂，斗酒十千恣歡謔。 主人何為言少錢，徑須沽取對君酌！ 五花馬，千金裘，呼兒將出換美酒，與爾同銷萬古愁！（李白〈將 進酒〉）","subquestions":[{"num":1,"stem":"關於李白〈將進酒〉一詩的詩意，下列何者闡述正確？","options":{"A":"「人生得意須盡歡，莫使金樽空對月」表示不要過分得意，否則 容易樂極生悲","B":"「天生我材必有用，千金散盡還復來」表示人 都有賺錢的才能，不要害怕窮困","C":"「鐘鼓饌玉不足貴，但願長 醉不復醒」是希望沉醉在現下的歡愉之中，不必擔憂錢財耗費、 也不用面對種種愁緒","D":"「五花馬，千金裘，呼兒將出換美酒」 是因為詩人嗜酒如命，願為之傾家蕩產"},"answer":"A","explanation":""},{"num":2,"stem":"下列文句，哪句最適合直接做為本詩主旨？","options":{"A":"黃河之水 天上來，奔流到海不復回","B":"人生得意須盡歡，莫使金樽空對月","C":"天生我材必有用，千金散盡還復來","D":"古來聖賢皆寂寞，惟有 飲者留其名"},"answer":"B","explanation":""},{"num":3,"stem":"「酒」在文化層面上占有很重要的地位，舉凡祭祀、朋友相 逢宴飲、餞別等場合都有其蹤影，快樂時助興可以喝酒，悲傷時 解悶也要來上幾杯，眾多心緒如：官場失意、離別、懷古傷今等 皆得以藉酒排遣。下列詩句，何者飲酒時的「場合」及「排遣的 心緒」皆與本詩相同？","options":{"A":"都門帳飲無緒，留戀處，蘭舟催發。 執手相看淚眼，竟無語凝噎","B":"落魄江湖載酒行，楚腰纖細掌中 輕。十年一覺揚州夢，贏得青樓薄倖名","C":"白髮漁樵江渚上，慣 看秋月春風。一壺濁酒喜相逢。古今多少事，都付笑談中","D":"蘭 陵美酒鬱金香，玉碗盛來琥珀光。但使主人能醉客，不知何處是 他鄉"},"answer":"C","explanation":""}],"explanation":"( 1 ) (A)表示人生應及時行樂。(B)表示高度肯定自我才華， (2)B (3)C 不應被金錢所累，轉向追求易逝青春中的短暫快樂。(D)五花馬、 千金裘都是財富的象徵，若能透過散盡家財消去萬古愁思，那也 是值得的，畢竟詩人自視甚高，認為錢財散盡還會再回來。 ( 2 ) 本詩意旨在於「及時行樂」 ，故「人生得意須盡歡，莫使金樽空 對月」最能表現出「及時行樂」的思想。(A)詩人藉此說明時光 易逝。(C)詩人對自身才氣相當自信，也表現出不為錢財所累的 瀟灑氣度。(D)詩人藉此表示聖賢因懷才不遇而寂寞，只有飲酒 的人才能留名後世。 ( 3 ) 題幹中的場合當為「朋友相逢宴飲」； 排遣的心緒則為「時光易逝，不如把握當下」 。(A)為「餞別」的 場合，心境悲傷，無法排解。出自柳永〈雨霖鈴〉。語譯：在京 都城外設帳餞別，卻沒有暢飲的心緒，正在依依不捨的時候，船 上的人已催著出發。握著手互相瞧著，滿眼淚花，直到最後也無 言相對，千言萬語都噎在喉間說不出來。(B)詩中無特別場合， 而是自嘲往昔的放蕩生活，顯現覺醒之後的悔恨之情。出自杜牧 〈遣懷〉 。語譯：失意流落江湖，經常攜酒而遊，這兒的女子腰 細體輕，如同趙飛燕可以作掌中舞。我在揚州遊樂，沉迷已久， 如今彷彿一夢醒來，只贏得青樓的姑娘們說我是個薄倖郎的名 聲。(C)應為「友人相逢宴飲」的場合，排遣的情緒則為「笑談 古今」，與李白詩中提及的「同銷萬古愁」相同。出自楊慎〈臨 江仙〉。語譯：江上白髮漁翁，早已習慣於四時的變化。和朋友 難得見了面，痛快的暢飲一杯酒。古往今來的紛紛擾擾，都成為 下酒閒談的材料。(D)應為「君臣宴飲」的場合，詩中寫雖在客 中卻得以酒為樂，讚美了美酒的清醇、主人的熱情，表現出李白 豪邁灑脫的精神境界。出自李白〈客中行〉 。語譯：蘭陵的美酒 散發出鬱金香的芬芳，用玉碗盛來閃動著琥珀般透明的清光。只 要主人能使我"},{"group_num":7,"passage":"閱讀下文，並回答下列問題。 夫天地者，萬物之逆旅也；光陰者，百代之過客也。而浮生若夢， 為歡幾何？古人秉燭夜遊，良有以也。況陽春召我以煙景，大塊假我 以文章。會桃花之芳園，序天倫之樂事。群季俊秀，皆為惠連；吾人 詠歌，獨慚康樂。幽賞未已，高談轉清。開瓊筵以坐花，飛羽觴而醉 月。不有佳詠，何伸雅懷？如詩不成，罰依金谷酒數。 （李白〈春夜宴 從弟桃花園序〉 ）","subquestions":[{"num":1,"stem":"依據上文，下列何者並非作者在文中所流露的情思？","options":{"A":"對人生苦短的悲慨與無奈","B":"苦讀詩書以求仕進的雄心 詩詠懷，欲以詩文傳千古","D":"及時行樂，展現疏狂的氣韻與態度"},"answer":"B","explanation":""},{"num":2,"stem":"依據上文，文章的主旨為何？ 苦海浮沉，不如歸去 (C)賦","options":{"A":"良辰美景，醉生夢死","C":"人生苦短，及時行樂","B":"","D":"親族歡聚，溫 情滿溢"},"answer":"A","explanation":""},{"num":3,"stem":"「夫天地者，萬物之逆旅也；光陰者，百代之過客也。而浮 生若夢，為歡幾何？」李白藉此感嘆人生短暫，歡樂無多。下列 何者也有與此相近的感懷？ 月將影，行樂須及春 壽無金石固","options":{"A":"月既不解飲，影徒隨我身。暫伴","B":"浩浩陰陽移，年命如朝露。人生忽如寄，","C":"少無適俗韻，性本愛丘山。誤落塵網中，一去三 十年","D":"對酒當歌，人生幾何！譬如朝露，去日苦多。慨當以慷， 憂思難忘"},"answer":"A","explanation":""}],"explanation":"( 1 ) (B)文章首先感嘆人生短暫，歡樂無多；接著強調此會在 (2)C (3)D 良辰美景下進行，天倫歡聚，為人生一大樂事；最後要求賦詩以 伸雅懷。並無流露「苦讀詩書以求仕進的雄心」 。 ( 2 ) (A)「醉 生夢死」形容人糊裡糊塗地活著，如在醉夢之中。非本文主旨。 (B)「苦海」比喻痛苦的處境。文中並無此意。(D)天倫歡聚為文 中所述之人生一大樂事，但並非本文主旨。 ( 3 ) (A)此句提到及 時行樂，但未見其感嘆人生短暫。出自李白〈月下獨酌〉 。語譯： 明月既不能理解開懷暢飲之樂，影子也只能默默地跟隨在我的左 右。我只得暫時伴著明月、清影，趁此美景良辰，及時歡娛。(B) 提及時光易逝，人生短暫，但並無「歡樂無多」的感嘆。出自〈驅 車上東門〉 。語譯：時光流轉無窮，人的一生像早晨的露水，太 陽一曬就消失了。人生好像旅客寄宿，匆匆一夜，就走出店門， 一去不返。人的壽命，並不像金子石頭那樣堅牢。(C)表達歸隱 的意向。出自陶淵明〈歸園田居〉其一。語譯：從小沒有投合世 俗的氣質，性格本來愛好山野。錯誤地陷落在人世的羅網中，一 去就是三十年。(D)「人生幾何！譬如朝露」感嘆人生之短暫， 後面提到憂思難忘，歡樂的時間便無多。出自曹操〈短歌行〉。 語譯：一邊喝酒一邊高歌，人生有多長？好比晨露 者比喻人只要有 美好的德行，自然能感動他人。出自司馬遷《史記•李將軍列傳》 。 語譯：桃樹李樹不招引別人，但因為他有美好的花果，便能吸引 人在他下面來往，而走成一條小路。(D)前者旨在描寫因自然景 觀帶來心曠神怡的感受，而自覺自己在官場沉浮，終日勞碌徬 徨，興起不如歸去之想。後者因山林中的靜謐閒適，對於長年仕 宦感到悲傷疲倦，進而生發歸去之感。出自張籍〈入若耶溪〉 。語 譯：蟬聲的鳴叫使樹林更顯靜謐，鳥鳴聲使山更顯幽靜。在這個 地方讓我興起歸去的念頭，長年以來常常對遊宦在外而感到悲傷 疲倦。 【語譯】終南山十分高大宛如要塞滿天地，日月從山的高處冉冉 升起，就像從石上生出來一樣。其他地方已被夜幕籠罩後，山的 高峰還留有落日的餘輝，成為夜晚一景；在其他地方已經灑滿陽 光時，山中深谷依然一片幽暗。因見大山中正不偏，山中的人的 心也跟著正直不邪。山路再險峻，在山中行走的人心也是坦蕩磊 落。長風過處將千萬松柏的枝葉吹得向一邊傾斜，風吹枝葉的聲 音在千溝萬壑間響起，宛如浪濤聲般清曠。我因此悔恨自己白作 一個讀書郎，到頭來無非是天天在虛名中彷徨。"},{"group_num":14,"passage":"閱讀下詩，並回答下列問題。 行行重行行，與君生別離。相去萬餘里，各在天一涯。道路阻且 長，會面安可知。胡馬依北風，越鳥巢南枝。相去日已遠，衣帶日已 緩。浮雲蔽白日，遊子不顧返。思君令人老，歲月忽已晚。棄捐勿復 道，努力加餐飯。（《古詩十九首‧行行重行行》 ）","subquestions":[{"num":1,"stem":"下列關於此詩的敘述，說明正確的是： 盪歲月中的相思離亂之歌 輕快的氛圍","options":{"A":"這是一首在動","B":"「行行」複沓的聲調，營造出步伐","C":"「浮雲蔽白日」在此暗指國君常為讒言所惑","D":"詩中以男子的口吻，訴說對故鄉妻子的思念"},"answer":"B","explanation":""},{"num":2,"stem":"下列關於此詩的文意說明，何者有誤？","options":{"A":"「胡馬依北風， 越鳥巢南枝」兩句用比興手法，暗喻思婦對遠行君子的思戀","B":"「思君令人老，歲月忽已晚」寫思婦青春易逝， 「坐愁紅顏老」的 遲暮之感","C":"「相去日已遠，衣帶日已緩」表示接受無法改變的 現實，逐漸安於現狀","D":"「棄捐勿復道，努力加餐飯」寫幽怨之 餘，仍望情人保重身體，抱持著重逢的希望"},"answer":"C","explanation":""},{"num":3,"stem":"下列何者最適合分別用來形容詩中的女子與遊子？ 子：鐵石心腸／遊子：身不由己 不思蜀 (B)女子：心如金石／遊子：樂 (C)女子：顧影自憐／遊子：鴻鵠大志","options":{"A":"女","D":"女子：抱恨終 天／遊子：狐死首丘"},"answer":"B","explanation":""}],"explanation":"( 1 ) (B)行行，走路不停的樣子。詩中兩人相距遙遠，營造出 (3)B 難以相會的悲傷氛圍。(C)在此比喻遊子為外物所絆而不思歸 家。(D)以女子口吻表達對遠行異鄉的情人之思念。 分離日久，人漸憔悴的景況。 ( 2 ) (C)寫 ( 3 ) 詩中由「衣帶日已緩」 、「思 君令人老」 ，可見女子的堅貞心意；由「浮雲蔽白日，遊子不顧 返」 ，可見遊子受外物吸引而無心返家，故選(B)，形容人意志堅 貞不渝／比喻樂而忘返或樂而忘本。(A)比喻意志堅定，不為私 情所惑／表示本身失去自主的能力。(C)形容孤獨失意的樣子／ 比喻宏大的志向。(D)心裡懷著恨意，至死都無法釋懷／比喻不 忘本或對故鄉的思念。 【語譯】走啊走啊！不停的走著，你我就這樣活生生地分開了。 我們兩人相距千萬里遠，彷彿各在天邊。路途艱險又遙遠，什麼 時候能見面呢？來自北方胡地的馬即使南來，仍然依戀著北風， 南方的鳥兒即使北飛，築巢仍在南向的枝頭上。彼此分離的時間 越長越久，衣服越發寬大，人也就越發消瘦了。飄蕩蕩的遊雲遮 住了太陽，讓他鄉的遊子不想再次返回。因為想你，使我的容顏 憔悴衰老了，然而時光仍不停止的流著，一年很快又到了年關。 罷了，還有許多心裡話都不說了，只願你多保重身體，切莫受飢 寒。"},{"group_num":15,"passage":"閱讀下詩，並回答下列問題。 諸葛大名垂宇宙，宗臣遺像肅清高， 三分割據紆籌策，萬古雲霄一羽毛， 伯仲之間見伊呂，指揮若定失蕭曹， 運移漢祚終難復，志決身殲軍務勞。（杜甫〈詠懷古蹟〉其五）","subquestions":[{"num":1,"stem":"關於本詩的寫作手法，敘述正確的是： 一代宗臣嚴肅少話、自命清高 人格如飛翔雲霄的鳳凰" ation":"(A)出自〈明月皎月光〉 。傷昔日好友因虛名而背棄友情。語譯： 遙望著那些名為「箕」 、 「斗」 、 「牽牛」的星星，它們都只是個 名字沒有實際作用。想到當年友人如此信誓旦旦，聲稱同門情 誼「堅如磐石」 。而今「同門」虛名猶存，但友情又何在？炎 涼世態如此，虛名又有什麼用呢？(B)出自〈今日良宴會〉 。言 154 / 198 人生短暫，所以要把握時間追慕富貴。語譯：人生短暫只有一 世，就像是塵土一樣，剎那間便被疾風吹散。為何不把握時機 捷足先登，先據高位而安樂地享受榮華富貴呢？(C)出自〈迴 車駕言邁〉 。言人生短暫，所以要把握時間追慕富貴。語譯： 人的生命不如金石堅固，即便是長壽也有盡期，不能長久下 去。生命急遽地就衰老死去，應立刻取得聲名與榮祿。(D)言 人生短暫，所以要及時行樂。語譯：白天的時光太短夜晚又長， 為何不執火燭在夜晚遊樂。正因為韶光易逝，所以行樂要即 時，怎麼可以等到來年。(E)出自〈驅車上東門〉 。言人生短暫， 所以要及時行樂。語譯：人生就好像旅客寄宿在天地間，壽命 不像金石般堅固。……不如喝點好酒，穿些好衣服，且樂當下。","num":42},{"stem":"「客從遠方來，遺我一端綺。相去萬餘里，故人心尚 爾。」思婦收到丈夫差人送來的禮物，感受到丈夫對她的情 意一如往昔。下列哪一首詩，是從丈夫的視角來表達對妻子 的思念？","options":{"A":"遊目四野外，逍遙獨延佇。蘭蕙緣清渠，繁華 蔭綠渚。佳人不在茲，取此欲誰與。巢居知風寒，穴處識陰 雨。不曾遠別離，安知慕儔侶","B":"客從遠方來，遺我一書札。 上言長相思，下言久別離。置書懷袖中，三歲字不滅。一心 抱區區，懼君不識察","C":"昔為倡家女，今為蕩子婦。蕩子行 不歸，空床難獨守","D":"浮雲蔽白日，遊子不顧返。思君令人 老，歲月忽已晚","E":"涉江采芙蓉，蘭澤多芳草。采之欲遺誰， 所思在遠道。還顧望舊鄉，長路漫浩浩。同心而離居，憂傷 以終老"},"answer":"AE","explanation":"(A)出自張華〈遊目四野外〉 。此詩為在外遠遊的男子思念妻子 之詩，從「佳人不在茲」可判斷。(B)出自《古詩十九首‧孟 冬寒氣至》 。自「懼君不識察」可判斷是自妻子視角出發。(C) 出自《古詩十九首‧青青河畔草》。從「蕩子行不歸」可知是 從妻子的視角出發。(D)出自《古詩十九首‧行行重行行》 。自 「遊子不顧返」 、「思君令人老」等句可知是從妻子視角出發。 (E)出自《古詩十九首‧涉江采芙蓉》 。「同心而離居」可知是 夫妻分別。 「所思在遠道」可知有思念的人在遠方，但是從「還 顧望舊鄉」 ，可知是在外漂泊的丈夫，思念故鄉的妻子。","num":43},{"stem":"下列選項「 百」相似？ 」中的文句，何者的意涵與「生年不滿","options":{"A":"迴風動地起，秋草萋已綠。四時更變化， 「歲 暮一何速」","B":"愚者愛惜費，但為後世嗤。 「仙人王子喬，難 可與等期」","C":"銀臺出倒景，白浪翻長鯨。 「安得不死藥，高 飛向蓬瀛」","D":"「人生非金石，豈能長壽考」 。奄忽隨物化， 榮名以為寶","E":"「良時不再至，離別在須臾」 。屏營衢路側， 執手野踟躕 題幹指人生短暫。"},"answer":"BD","explanation":"題幹指人生短暫。(A)指時光易逝。出自〈東城高且長〉 。語 156 / 198 譯：旋風捲地而起，萋萋秋草已轉黃綠。一年四季變化快，歲末 來得太匆忙。(B)仙人長壽，但凡人無此條件，呈現出凡人生命 之短暫。(C)指欲得不死之藥，使自己輕身飛向海中神山，從群 仙之遊。出自李白〈遊太山其四〉。語譯：神仙所居的銀臺仙宮 倒映在水中，長鯨掀起大海的白浪翻滾。如何能得到不死之藥， 使我高飛向海上的神山蓬萊和瀛洲？(D)以「非金石」指人生短 暫。出自〈迴車駕言邁〉 。語譯：人生在世不如金石般久長，哪 能長生於世不變老？眨眼之間即將步入死亡，還是早日揚名最重 要。(E)寫離別時刻將至。出自李陵〈與蘇武詩〉之二。語譯：美 好時光不再來，須臾之間您就要離去。依依不捨地留連路邊，牽 手在野外徘徊。","num":44},{"stem":"左思〈詠史〉 ： 「功成不受爵，長揖歸田廬。」此句所 流露出的態度，下列與此相似的是：","options":{"A":"無伐善，無施勞 博施於民，而能濟眾","C":"功成恥受賞，高節卓不群 當及時，何能待來茲","E":"不在其位，不謀其政","B":"","D":"為樂"},"answer":"AC","explanation":"(A)題幹流露出功成不居的態度。選項出自《論語‧公冶長》 。 語譯：不誇耀自己的才能，不張揚自己的功勞。(B)出自《論 語‧雍也》 。語譯：廣施恩惠，救助大眾。(C)出自左思〈詠史〉 其一。語譯：成功後以接受賞賜為恥辱，高尚的節操不同於流 俗。(D)意謂把握當下，及時行樂。譯享受快樂要把握時機， 157 / 198 怎能等待以後呢？(E)出自《論語‧泰伯》 。語譯：己身不任某 職位，則不參與策劃該職位的事務。","num":45},{"stem":"下列關於〈生年不滿百〉與左思〈詠史〉的比較，說 明正確的選項是：","options":{"A":"二詩在形式上皆屬於五言古詩 二詩皆以敘述事件為主，情節生動 的心態","B":"","C":"二詩皆流露積極用世","D":"〈詠史〉表面上寫歷史事件，實則暗批時局","E":"〈生年不滿百〉以「樂」字為詩眼，勸人在無常命運中把握 有限生命"},"answer":"AE","explanation":"(B)二詩皆以抒懷為主。(C)只有左思〈詠史〉一詩流露欲有用 於當世的心態。(D)〈詠史〉並未批判時局，而是表達想報效 國家的志願。","num":46},{"stem":"有關〈生年不滿百〉詩句的詮釋，敘述適當的是：","options":{"A":"「生年不滿百，常懷千歲憂」 ：將生命中的憂愁量化，點出人 生短暫卻負擔沉重的現實","B":"「晝短苦夜長，何不秉燭遊」： 以「晝短夜長」強調可利用的時間之少，並提出「秉燭遊」 的解決方案","C":"「為樂當及時，何能待來茲」 ：主張行樂應把 握時機，勿寄託於充滿變數的未來","D":"「愚者愛惜費，但為 後世嗤」 ：舉出愚者散盡家財的反面之例，說明行樂不可過度","E":"「仙人王子喬，難可與等期」 ：強調凡人壽命難與仙人相同， 表達對求仙者的批判 (D)指出固守錢財卻不懂得享受人生的愚昧，凸顯「為樂當及 時」的論點。"},"answer":"ABCE","explanation":"(D)指出固守錢財卻不懂得享受人生的愚昧，凸顯「為樂當及 時」的論點。","num":47},{"stem":"關於〈生年不滿百〉與〈詠史〉二詩的寫作手法，下 列敘述正確的是：","options":{"A":"〈生年不滿百〉以「人生短、憂愁長」 與「白天短、黑夜長」兩組對比為基礎，強化及時行樂的合 理性 懷","B":"〈詠史〉藉由典故的運用，以具體歷史形象自況抒","C":"二詩皆傳達各自的生命態度， 〈生年不滿百〉著重個人 面向，而〈詠史〉則更重視國家社會層面 對比的手法，凸顯面對亂世的絕望","D":"二詩皆以今昔","E":"二詩皆先從正面立 論，後從反面論證 (D)皆未使用今昔對比的手法。(E)僅〈生年不滿百〉有。"},"answer":"ABC","explanation":"(D)皆未使用今昔對比的手法。(E)僅〈生年不滿百〉有。","num":48},{"stem":"清沈德潛《說詩晬語》將〈古詩十九首〉的內容大略 分成四類： 「大率逐臣棄婦，朋友闊絕，遊子他鄉，死生新故 之感。」然細究各篇情感，則不難發現其中往往有相涉之處， 同一篇作品中雜有不同主題，無法嚴格區分，請問為何會產 生這種現象？","options":{"A":"作者在書寫作品時刻意混雜書寫 類的情感本來就多元，生命的困境也不單一 的觀點，書寫的人只管書寫當下情感 意到細部差異","B":"人","C":"分類是後人","D":"分類的時候沒有注","E":"當時的作者並不認為這四種類別有所不同"},"answer":"BC","explanation":"(A)並非刻意混雜，而是自然書寫。(B)人類的情感本來就多元， 生命的困境也不單一，很難只專寫單一情感而不指涉其他。(C) 後人根據前人所留資料分類，並不是前人有意要分類。(D)分 類時只要經過比較就找得出差異，而且這四類主題差異性頗 大。(E)作者是因遭遇生命困境才書寫出作品，並無法預知後 人會將這些作品進行分類。","num":49},{"stem":"關於「古詩」，下列敘述何者正確？ 之名，始於唐，係士大夫階級的作品 歌文學的兩大主流","options":{"A":"「古詩」","B":"與樂府詩是漢朝詩","C":"與樂府相較，古詩多為敘事之作 《古詩十九首》為五言詩，殆為西漢之作","D":"","E":"《古詩十九首》 之作質樸自然，簡潔生動，對後世五言詩之發展，影響極大"},"answer":"BE","explanation":"(A)至少在《昭明文選》時已有古詩之名。(C)古詩多以抒情為 主。(D)東漢。","num":50},{"stem":"人 (B)才兼文武，曾獻策平定東吳、西羌，有功於國 下列對左思的敘述，何者正確？","options":{"A":"字太沖，西晉","C":"不善言辭而善於作詩作賦， 〈詠史〉詩、〈三都賦〉為其傳世 代表作","D":"詩風矯健，遙承「建安風骨」","E":"首創詠史詩","B":"只是見諸詩文中的志向，實際上仕途不順，無所作為。(E) 早在東漢班固即有詠史之作。"},"answer":"ACD","explanation":"(B)只是見諸詩文中的志向，實際上仕途不順，無所作為。(E) 早在東漢班固即有詠史之作。","num":51},{"stem":"小山和小民剛學完古詩選的相關文學史知識，兩人為 了幾個問題爭執不休，下列他們對於古詩的敘述，何者正確？","options":{"A":"古詩又稱「古風、古體詩」，是相對於新詩而來","B":"古詩 起源比樂府詩略晚，東漢末年出現的《古詩十九首》乃為古 詩成熟的高峰","C":"古詩的格律要求比較寬鬆，可不用押韻","D":"古詩內容多感時言愁、離別相思類的作品","E":"古詩風格較 溫柔敦厚，以敘事為主，尚溫雅"},"answer":"BD","explanation":"(A)古詩之名是相對於「近體詩」而來，非新詩。(C)古詩的格 律要求比較寬鬆，還是「要押韻」，但可換韻。(E)古詩風格較 溫柔敦厚，以「抒情」為主，非敘事。","num":52},{"stem":"下列詞語皆可用來形容年齡，哪一組年齡是按照由小 到大的次序排列？","options":{"A":"黃髮／垂髫 及笄之年／二八佳人","D":"不惑之年／而立之年","B":"弱冠／志學","C":"","E":"總角／ 束髮"},"answer":"CE","explanation":"(A)老人髮色轉黃，是高壽的象徵／約五、六歲。兒童未束髮， 而髮已長。(B)二十歲／十五歲。(C)女子十五歲／女子十六歲。 (D)四十歲／三十歲。(E)約八至十四歲。舊時未成年男女編紮 頭髮，如兩角狀／十五歲。","num":53},{"stem":"下列關於左思〈詠史〉其一的敘述，何者錯誤？","options":{"A":"「著論準〈過秦〉，作賦擬〈子虛〉」反映左思的自信、自負","B":"「邊城苦鳴鏑，羽檄飛京都」說明自己守邊的辛苦，以與逸樂對比","C":"「雖非甲冑士，疇昔覽《穰苴》」暗示自己既有文才，也有武略，而此時願意投筆從戎","D":"「鉛刀貴一割」比喻才能低下，仍願為國效力"},"answer":"B","explanation":"(B)暗示四海未靖，國家多難，急需安邦定國的人為國效力。","num":54},{"stem":"下列關於「古詩」的敘述，說明正確的選項是： 古詩即古體詩，是相對於近體詩而言 稱，負責採集民間歌謠以入樂","options":{"A":"","B":"古詩本為官署名","C":"古詩要押韻且一韻到底， 不可換韻","D":"產生於兩漢，成熟於魏晉，沒落於南北朝，復 興於唐宋","E":"與樂府詩同為漢代詩歌文學雙葩"},"answer":"ADE","explanation":"(B)為「樂府」的特色。(C)可以換韻。","num":55},{"stem":"下列關於樂府詩與古詩的比較，何者正確？ 樂府詩作者多為士大夫，古詩作者多佚名","options":{"A":"","B":"樂府詩字數多 為五、七言，古詩多為雜言","C":"樂府詩風格遒勁，古詩風格 溫雅","E":"二者皆不限句數","D":"二者皆合歌可唱"},"answer":"CE","explanation":"(A)樂府詩的作者多佚名，古詩的作者多為士大夫。(B)樂府詩 字數多為雜言，古詩則多為五、七言。(D)古詩不入樂。","num":56},{"stem":"下列的文句，何者描述的季節是「冬季」？","options":{"A":"人初靜。月正明。紗窗外玉梅斜。梅花笑人休弄影，月沉時 一般孤令","B":"雲收雨過波添，樓高水冷瓜甜，綠樹陰垂畫檐。 紗幮藤簟，玉人羅扇輕縑","C":"孤村落日殘霞，輕煙老樹寒鴉， 一點飛鴻影下。青山綠水，白草紅葉黃花","D":"霧淞沆碭，天 與雲、與山、與水，上下一白；湖上影子，為長堤一橫，湖 心亭一點，與余舟一介","E":"荷盡已無擎雨蓋，菊殘猶有傲霜 枝，一年好景君須記，最是橙黃橘綠時"},"answer":"ADE","explanation":"(A)自「玉梅」可知為冬季。出自馬致遠〈落梅風‧人初靜〉 。 語譯：人才寧定，夜已深沉，月色正明，紗窗外，梅枝的影兒 又斜又長。梅花你不要故意奚落人，頻頻逗弄自己的影子。哼！ 等月亮落下，你還不是和我一樣孤伶伶的！(B)由瓜甜、綠樹 陰垂、羅扇可知是「夏季」 。出自白樸〈天淨沙‧夏〉 。語譯： 雲收雨霽，流水波添，雨過天晴，樓也顯得比平時高，水散發 著涼爽的氣息，雨後的瓜似乎也顯得比平時甜了，綠樹的樹陰 一直垂到畫檐。紗帳中的藤席上，一個身著輕絹夏衣，手執羅 扇的芳齡女孩，靜靜地享受著宜人的時光。(C)由白草紅葉黃 花可知是「秋季」 。出自白樸〈天淨沙‧秋〉 。語譯：一座孤村、 一輪落日、一抹殘霞，一縷輕煙、一株老樹、一隻寒鴉。天邊 的一點，是鴻雁的身影，慢慢地掠過，青山綠水，白草、紅葉 和黃花。(D)出自張岱〈湖心亭看雪〉 。(E)自「菊殘」、「橙黃 橘綠」可判知。出自蘇軾〈贈劉景文〉。語譯：入冬了，荷花 早已謝盡，連那可擎天蔽雨的田田荷葉，也在冬意催逼下蕩然 163 / 198 枯盡。即使是耐得住秋霜的菊花，也凋零僅剩殘瓣。但是那尚 存的枯枝花梗，還在風中傲然挺立。我的好友劉君啊","num":57},{"stem":"關於「古體詩」與「近體詩」，下列敘述何者正確？","options":{"A":"古體詩每首字數不定，不必講求平仄、對仗 和一首七律共七十六字","C":"律詩超過八句的叫排律，除首末 聯不對仗外，中間各聯須兩兩對仗 自對仗","B":"一首五絕","D":"律詩第二、三聯要各","E":"二者大抵協律，皆可被之管絃 (E)古體詩、近體詩大抵不入樂。"},"answer":"ABCD","explanation":"(E)古體詩、近體詩大抵不入樂。","num":58},{"stem":"關於「古詩」與「樂府詩」 ，下列敘述何者正確？","options":{"A":"古詩指唐朝以前有別於近體詩者；樂府詩則是指漢樂府所收 集之詩","B":"作者均出自民間 則長短句居多","C":"古詩五、七言居多；樂府詩","D":"均起於兩漢","E":"均不重平仄，可換韻，可 被之管絃"},"answer":"ACD","explanation":"(B)樂府詩作者多出於民間，古詩作者則多為士大夫。(E)古詩 不入樂（不被之管絃）。","num":59},{"stem":"下列有關於「詩」的敘述，何者正確？ 體詩成熟後，古詩遂衰 (C)古詩可以轉韻","options":{"A":"唐代近","B":"古詩起於兩漢，至唐始發展開來","D":"〈孔雀東南飛〉是五言敘事詩，收錄在 郭茂倩《樂府詩集》中","E":"〈木蘭辭〉也是一首敘事樂府詩"},"answer":"CDE","explanation":"(A)唐代詩人亦常以古詩形式創作。(B)東漢末年古詩已有十分 出色的作品。","num":60},{"stem":"下列有關作家、作品、相關典故的配對，何者正確？","options":{"A":"韓愈／〈師說〉／畫荻教子 磨針","B":"李白／〈長干行〉／鐵杵","C":"陶潛／〈桃花源記〉／羲皇上人 詩／洛陽紙貴","D":"左思／〈詠史〉","E":"范仲淹／〈岳陽樓記〉／斷虀畫粥"},"answer":"BCDE","explanation":"(A)「畫荻教子」為歐陽脩的典故。","num":61},{"stem":"下列關於古詩、樂府詩的比較，何者正確？","options":{"A":"作者：樂府詩多來自民間／古詩多文人士大夫之作","B":"音樂 性：樂府詩可入樂，可歌／古詩不可入樂，可誦","C":"風格： 樂府詩主言情，尚溫雅／古詩主敘事，貴遒勁","D":"句式：樂 府詩多五、七言／古詩多為長短句","E":"起源： 「樂府」源自漢 代官署名，演變為詩體名稱／「古詩」一名始於唐代，為了 和「近體詩」作區別"},"answer":"ABE","explanation":"(C)樂府詩「主敘事，貴遒勁」，古詩「主言情，尚溫雅」。(D) 樂府詩多長短句，古詩多五、七言。","num":62},{"stem":"左思的〈詠史〉詩熔鑄了他平生的理想，也包含了深 厚的社會內容，在文學史上有其堅實地位。以下關於左思〈詠 史〉詩的敘述，何者正確？","options":{"A":"左思的〈詠史〉詩專詠一人 一事，繼承了「詠史詩」的傳統寫法，被稱為正體的「詠史 詩」","B":"左思〈詠史〉詩亦勇於創新，使詩歌能更好地「吟 詠情性」 ，抒情言志","C":"左思的〈詠史〉詩喜用激昂的豪言壯 語，如： 「長嘯激清風，志若無東吳」 、 「振衣千仞崗，濯足萬 里流」等句","D":"左思的〈詠史〉詩筆力矯健，情調高亢，有 別於當時崇尚雕琢的文壇風氣","E":"左思的〈詠史〉詩力矯太 康頹靡文風，承繼建安雄健骨力，影響後代作家如：鮑照、 李白、杜甫等"},"answer":"BCDE","explanation":"(A)左思的詠史詩不專詠一人一事，打破了「詠史詩」的傳統 寫法，被稱為變體的「詠史詩」 。","num":63},{"stem":"下列為樂府和古詩的比較表，請選出敘述 間寵辱休驚 卻巫山不是雲","D":"曾經滄海難為水，除","E":"萬物靜觀皆自得，四時佳興與人同"},"answer":"A","explanation":""}],"explanation":"( 1 ) (A)作者形容浪「像是一腳踹破百年塵封的巨罈，把滾滾 ( 2 ) (A)(E) 的雪白泡液直逼像乾燥的沙灘」 、 「像滿臉虬髯的彪形大漢，浪盡 天涯，帶一支沙啞的歌」 、「暗藏殺機」，又云「看海浪，需要一 等的氣魄」 ，並未描述其柔情的一面。(B)由文中末段「綠，是一 種原始生命力的暗示……突然，世界變得美好」可知。(C)作者 視自身為浪，與萬物共生共融於天地之間。(D)文中未有此意。(E) 文中個別論述海浪與稻浪的特色，並未比較二者優劣。 ( 2 ) (A) 意為「用心體會生活中細微的事物，便能從中發現樂趣，領會生 命的感動」 。此與文中畫線處「感受生命為一動人奇蹟，因而心 花怒放」的心境相似。出自威廉．布萊克(William Blake)〈純真 的預言〉 。(B)人生短暫，應即時行樂。出自李白〈將進酒〉 。語 譯：人生短暫，所以在得意的時候必須盡情地歡樂，不要使酒杯 空對著月亮。(C)說明人生無論坐擁富貴奢華，或是隱居鄉野山 林，都猶如一場幻夢，切勿為了世間得失而心驚。出自辛棄疾〈臨 江仙〉 。(D)比喻見識廣闊，認為平常事物不足為奇；或比喻曾擁 有美好的感情經歷，今不願再面對或接受新對象。出自劉禹錫〈離 思〉其四。語譯：曾臨經滄海，認為他處的水無以為水；除了巫 山，別處的雲便不能稱其為雲。(E)意為「靜觀萬物，即能自其中 獲得自然的樂趣，並感受四季佳景各有其殊勝之處」 ，表達自身 對於生活之美的體悟與感懷，此與文中畫線處的心境相似。出自 程顥〈秋日偶成〉。"},{"group_num":4,"passage":"閱讀甲、乙二文，並回答下列問題。 甲 開歲倏五日，吾生行歸休。念之動中懷，及辰為茲游。 氣和天惟澄，班坐(１)依遠流。弱湍馳文魴，閑谷矯(２)鳴鷗。 迥澤(３)散游目，緬然睇曾丘。雖微九重(４)秀，顧瞻無匹儔。 提壺接賓侶，引滿更獻酬。未知從今去，當復如此不？ 中觴縱遙情，忘彼千載憂。且極今朝樂，明日非所求。 （陶淵明〈遊 斜川〉） 乙 夫天地者，萬物之逆旅(５)也；光陰者，百代之過客也。而浮生 若夢，為歡幾何？古人秉燭夜遊，良有以也。況陽春召我以烟景，大 塊(６)假我以文章。會桃花之芳園，序天倫之樂事。群季俊秀，皆為 惠連(７)；吾人詠歌，獨慚康樂。幽賞未已，高談轉清。開瓊筵以坐 花，飛羽觴而醉月。不有佳詠，何伸雅懷？如詩不成，罰依金谷(８) 酒數。（李白〈春夜宴桃李園序〉 ） 【注釋】(１)班坐：依次而坐。(２)矯：飛翔。(３)迥澤：寬廣的湖泊。 (４)九重：指崑崙山上的增城。(５)逆旅：旅館。(６)大塊：天地、大 自然。(７)惠連：謝靈運族弟，十歲能文，曾為雪賦，世稱「小謝」。 (８)金谷：即晉石崇所建的庭園。","subquestions":[{"num":1,"stem":"關於甲、乙二文的寫作手法和文意，敘述適當的是：","options":{"A":"二文先敘景色爛漫，再言及酒席上觥籌交錯之景，抒發心中體悟","B":"二文皆先提及先人所感來強化自身觀點，進而歸結浮生如寄為 從古至今的集體共感","C":"甲文「且極今朝樂，明日非所求」之感， 亦呼應到乙文的「古人秉燭夜遊，良有以也」","D":"甲文作者隱含 對自身年歲漸長，傳達時不我待的焦慮之情","E":"乙文以坦率熱烈 的語氣，強調良辰美景下更應該把握與天倫歡聚的時光"},"answer":"A","explanation":""},{"num":2,"stem":"甲、乙二文皆藉記敘宴飲之樂傳達人生感悟。下列文句， 與二文作者感悟相同的是： 不作樂，春花不重生 無貽白首歎","options":{"A":"熒熒帳中燭，燭滅不久停。盛時","B":"金石終消毀，丹青暫雕煥。各勉玄髮歡，","C":"李公悲東門，蘇子狹三河。求仁自得仁，豈復歎 咨嗟","D":"人生天地間，忽如遠行客。斗酒相娛樂，聊厚不為薄","E":"人生世間如電過，樂時每少苦日多。幸及良辰耀春華，齊倡獻舞 趙女歌"},"answer":"ABDE","explanation":""}],"explanation":"( 1 ) (A)只有甲文符合，乙文為先寫心中所感，再敘及宴飲情 ( 2 ) (A)(B)(D)(E) 景。(B)甲文並無提及先人所感，僅提及作者自身觀點。乙文由 「夫天地者，萬物之逆旅也；光陰者，百代之過客也」說明生命 在世間上的短暫，並援引古人「秉燭夜遊」一事可知。(C)甲文 「且極今朝樂，明日非所求」表達出明日不可知，不如把握現在 時機，盡享歡樂的體悟，與乙文「古人秉燭夜遊，良有以也」說 明古人因惋惜光陰易逝，故持燭在夜裡遊玩，同樣傳達出及時行 樂的思想。(D)由「開歲倏五日，吾生行歸休。念之動中懷，及 辰為茲游」可知作者正是因為有感光陰似箭，自己的年歲也在不 知不覺中不斷增長，並可由「且極今朝樂，明日非所求」推知作 者隱含對時間流逝的焦慮之情。時不我待：時間或機會不會等待 我們，比喻要善於把握時間或機會。(E)由「會桃花之芳園，序天 倫之樂事」中可知。 ( 2 ) 二文皆藉記敘宴飲之樂傳達人生短暫， 應及時行樂之感悟。(A)以燭火喻人生命之短暫，並以春花說明 盛年不重來，傳達應及時行樂的思想，與題幹相符。出自〈幽州 馬客吟〉其二。語譯：帳中蠟燭發微光，須臾燭滅不久長。年富 力強不作樂，春花謝後不重放。(B)以金石、丹青等用以流傳後 世的物品終會消亡一事，感慨生命之短，表達應趁年輕時盡情歡 樂，避免老去時追悔莫及，與題幹相符。出自謝惠連〈秋懷〉。 語譯：刻有功名的金石最終也將消毀，繪有形貌的丹青僅擁有短 暫的光彩。各位還是努力在年輕時盡情地歡樂吧，不要留待年老 時才嘆息不已。(C)以戰國時代李斯、蘇秦為求功名利祿而不得 善終，傳達自身對爭名逐利一事的態度，與題幹不符。出自阮籍 〈詠懷〉其六。語譯：李斯在臨刑前為不能再與兒子一起出東門 逐狡兔而悲哀，蘇秦離開三河之地追名逐利終被刺身亡。追求什 麼便得到了什麼，有哪裡值得一再嘆息呢！(D)以人生在世猶如 過客喻生命之短"}]};
const TOTALS = [0,142,47,81,10];
const LABELS = ['','一、單選題','二、單選閱讀題組','三、多選題','四、多選閱讀題組'];
const DB_NAME = 'quizApp';

let db;
function openDB() {
  return new Promise((res,rej) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('progress')) d.createObjectStore('progress');
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => rej();
  });
}
function dbGet(key) {
  return new Promise(res => {
    if (!db) { res(null); return; }
    const tx = db.transaction('progress','readonly');
    const req = tx.objectStore('progress').get(key);
    req.onsuccess = () => res(req.result || null);
    req.onerror = () => res(null);
  });
}
function dbSet(key, val) {
  if (!db) return;
  const tx = db.transaction('progress','readwrite');
  tx.objectStore('progress').put(val, key);
}

let sec=0, queue=[], qi=0, score=0, answered=0;
let wrongItems=[], sessionAnswered=new Set();
let selOpts=new Set(), fbShown=false, isRetry=false;

function buildQueue(s) {
  let items = [];
  if (s===1) QUIZ.sec1.forEach(q => items.push({type:'single',s,q}));
  else if (s===2) QUIZ.sec2.forEach(g => g.subquestions.forEach(q => items.push({type:'single',s,q,passage:g.passage,exp:g.explanation})));
  else if (s===3) QUIZ.sec3.forEach(q => items.push({type:'multi',s,q}));
  else if (s===4) QUIZ.sec4.forEach(g => g.subquestions.forEach(q => items.push({type:'multi',s,q,passage:g.passage,exp:g.explanation})));
  return items;
}

async function updateHome() {
  await openDB();
  for (let s=1;s<=4;s++) {
    const prog = await dbGet('prog_'+s) || {done:0,wrong:[],qi:0};
    const total = TOTALS[s];
    const pct = total ? Math.round(prog.done/total*100) : 0;
    document.getElementById('pb'+s).style.width = pct+'%';
    const pt = document.getElementById('pt'+s);
    if (prog.done===0) {
      pt.textContent = '尚未開始';
      pt.className = 'card-foot';
    } else if (prog.done >= total) {
      pt.textContent = '已完成 ✓';
      pt.className = 'card-foot';
    } else {
      pt.textContent = prog.done+'/'+total+' 完成（'+pct+'%）— 點擊繼續';
      pt.className = 'card-foot has-progress';
    }
  }
  // Check for resume
  checkResume();
}

async function checkResume() {
  for (let s=1;s<=4;s++) {
    const prog = await dbGet('prog_'+s) || {done:0,wrong:[],qi:0};
    if (prog.done > 0 && prog.done < TOTALS[s] && prog.qi > 0) {
      const banner = document.getElementById('resumeBanner');
      document.getElementById('resumeText').textContent =
        LABELS[s] + '・第 ' + (prog.qi+1) + ' 題（已完成 ' + prog.done + '/' + TOTALS[s] + '）';
      banner.dataset.sec = s;
      banner.classList.add('show');
      return;
    }
  }
}

async function resumeSession() {
  const banner = document.getElementById('resumeBanner');
  const s = parseInt(banner.dataset.sec);
  const prog = await dbGet('prog_'+s) || {done:0,wrong:[],qi:0};
  sec = s;
  isRetry = false;
  queue = buildQueue(s);
  qi = prog.qi || 0;
  score = prog.score || 0;
  answered = prog.answered || 0;
  wrongItems = (prog.wrongNums||[]).map(n => ({num:n,stem:''}));
  sessionAnswered = new Set();
  show('quiz');
  document.getElementById('qLabel').textContent = LABELS[s];
  renderQ();
}

function dismissResume(e) {
  e.stopPropagation();
  document.getElementById('resumeBanner').classList.remove('show');
}

function clearAll() {
  if (!confirm('確定清除所有進度？')) return;
  for (let s=1;s<=4;s++) dbSet('prog_'+s, {done:0,wrong:[],qi:0,score:0,answered:0,wrongNums:[]});
  document.getElementById('resumeBanner').classList.remove('show');
  updateHome();
}

async function startSection(s) {
  const prog = await dbGet('prog_'+s) || {done:0,qi:0};
  // If has progress, ask continue or restart
  if (prog.done > 0 && prog.done < TOTALS[s] && prog.qi > 0) {
    const cont = confirm('上次做到第 '+(prog.qi+1)+' 題，要繼續嗎？
（取消 = 從頭開始）');
    if (cont) {
      sec = s; isRetry = false;
      queue = buildQueue(s);
      qi = prog.qi || 0;
      score = prog.score || 0;
      answered = prog.answered || 0;
      wrongItems = (prog.wrongNums||[]).map(n => ({num:n,stem:''}));
      sessionAnswered = new Set();
      show('quiz');
      document.getElementById('qLabel').textContent = LABELS[s];
      renderQ();
      return;
    }
  }
  // Fresh start
  sec=s; isRetry=false;
  queue=buildQueue(s); qi=0; score=0; answered=0;
  wrongItems=[]; sessionAnswered=new Set();
  show('quiz');
  document.getElementById('qLabel').textContent = LABELS[s];
  renderQ();
}

async function retryWrong() {
  const prog = await dbGet('prog_'+sec) || {done:0,wrong:[]};
  const wNums = prog.wrong||[];
  if (!wNums.length) { restartSection(); return; }
  const all = buildQueue(sec);
  queue = all.filter(item => wNums.includes(item.q.num));
  if (!queue.length) { restartSection(); return; }
  qi=0; score=0; answered=0; wrongItems=[]; sessionAnswered=new Set();
  isRetry=true; show('quiz');
  document.getElementById('qLabel').textContent = LABELS[sec];
  renderQ();
}

function restartSection() {
  isRetry=false; queue=buildQueue(sec);
  qi=0; score=0; answered=0; wrongItems=[]; sessionAnswered=new Set();
  dbSet('prog_'+sec, {done:0,wrong:[],qi:0,score:0,answered:0,wrongNums:[]});
  show('quiz'); renderQ();
}

function renderQ() {
  if (qi>=queue.length) { showResult(); return; }
  fbShown=false; selOpts=new Set();
  const pct = Math.round(qi/queue.length*100);
  document.getElementById('qpbar').style.width=pct+'%';
  document.getElementById('qScore').textContent=score+'/'+answered;
  const body = document.getElementById('qBody');
  body.innerHTML='';
  const item = queue[qi];

  if (item.passage) {
    const pb=document.createElement('div');
    pb.className='passage-box'; pb.textContent=item.passage;
    body.appendChild(pb);
  }

  const card=document.createElement('div'); card.className='q-card';
  const qn=document.createElement('div'); qn.className='q-num';
  qn.textContent = item.q.num ? '第 '+item.q.num+' 題' : '';
  card.appendChild(qn);
  const stem=document.createElement('div'); stem.className='q-stem';
  stem.textContent=item.q.stem||''; card.appendChild(stem);
  const opts=document.createElement('div'); opts.className='opts';
  const letters=Object.keys(item.q.options||{}).sort();

  if (item.type==='single') {
    letters.forEach(l => {
      const btn=document.createElement('button'); btn.className='opt-btn';
      btn.textContent='('+l+') '+item.q.options[l];
      btn.onclick=()=>answerSingle(btn,l,item,opts);
      opts.appendChild(btn);
    });
  } else {
    const hint=document.createElement('div'); hint.className='multi-hint';
    hint.textContent='多選題：勾選所有正確選項後按「確認」';
    opts.appendChild(hint);
    letters.forEach(l => {
      const wrap=document.createElement('div'); wrap.className='opt-check';
      const cb=document.createElement('input'); cb.type='checkbox'; cb.value=l;
      cb.onchange=()=>{ if(cb.checked)selOpts.add(l); else selOpts.delete(l);
        wrap.classList.toggle('sel',cb.checked); };
      const sp=document.createElement('span'); sp.textContent='('+l+') '+item.q.options[l];
      wrap.appendChild(cb); wrap.appendChild(sp);
      wrap.onclick=e=>{ if(e.target!==cb) cb.click(); };
      opts.appendChild(wrap);
    });
    const cfm=document.createElement('button'); cfm.className='confirm-btn'; cfm.id='cfmBtn';
    cfm.textContent='確認'; cfm.onclick=()=>answerMulti(item,opts);
    opts.appendChild(cfm);
  }
  card.appendChild(opts); body.appendChild(card);
  window.scrollTo(0,0);
}

function answerSingle(btn,l,item,opts) {
  if(fbShown) return; fbShown=true; answered++;
  const ans=(item.q.answer||'').toUpperCase();
  const ok=ans.includes(l);
  opts.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  if(ok){ btn.classList.add('correct'); score++; }
  else {
    btn.classList.add('wrong');
    opts.querySelectorAll('.opt-btn').forEach(b=>{ if(ans.includes(b.textContent.charAt(1))) b.classList.add('reveal'); });
  }
  if(!ok) trackWrong(item);
  sessionAnswered.add(item.q.num);
  showFeedback(ok,item); saveProgress();
}

function answerMulti(item,opts) {
  if(fbShown) return; fbShown=true; answered++;
  const ans=(item.q.answer||'').replace(/全/g,'ABCDE').toUpperCase();
  const correct=new Set(ans.split(''));
  const ok=[...correct].every(l=>selOpts.has(l))&&[...selOpts].every(l=>correct.has(l));
  opts.querySelectorAll('input[type=checkbox]').forEach(cb=>cb.disabled=true);
  const cfm=document.getElementById('cfmBtn'); if(cfm) cfm.style.display='none';
  opts.querySelectorAll('.opt-check').forEach(wrap=>{
    const cb=wrap.querySelector('input'); if(!cb) return;
    const l=cb.value, sel=selOpts.has(l), isAns=correct.has(l);
    if(sel&&isAns) wrap.classList.add('correct');
    else if(sel&&!isAns) wrap.classList.add('wrong');
    else if(!sel&&isAns) wrap.classList.add('reveal');
  });
  if(ok) score++;
  if(!ok) trackWrong(item);
  sessionAnswered.add(item.q.num);
  showFeedback(ok,item); saveProgress();
}

function trackWrong(item) {
  if(!wrongItems.find(w=>w.num===item.q.num))
    wrongItems.push({num:item.q.num, stem:(item.q.stem||'').slice(0,60)});
}

function showFeedback(ok,item) {
  const card=document.querySelector('.q-card'); if(!card) return;
  const fb=document.createElement('div'); fb.className='feedback '+(ok?'ok':'ng');
  const lbl=document.createElement('div'); lbl.className='fb-label';
  lbl.textContent=ok?'✓ 答對了！':'✗ 答錯了';
  fb.appendChild(lbl);
  if(!ok) {
    const a=document.createElement('div'); a.className='fb-ans';
    const ans=(item.q.answer||'').replace(/全/g,'ABCDE');
    a.textContent='正確答案：'+[...ans].map(l=>'('+l+')').join('');
    fb.appendChild(a);
  }
  const exp=item.q.explanation||item.exp||'';
  if(exp) {
    const e=document.createElement('div'); e.className='fb-exp';
    e.textContent=exp.slice(0,300)+(exp.length>300?'…':'');
    fb.appendChild(e);
  }
  card.appendChild(fb);
  const nxt=document.createElement('button'); nxt.className='next-btn';
  nxt.textContent=qi+1<queue.length?'下一題 →':'查看結果';
  nxt.onclick=()=>{
    if(!ok&&qi+1<queue.length) {
      const off=Math.floor(Math.random()*4)+2;
      const pos=Math.min(qi+off,queue.length);
      if(!queue.slice(qi+1).some(f=>f.q.num===queue[qi].q.num))
        queue.splice(pos,0,{...queue[qi]});
    }
    qi++; renderQ();
  };
  card.appendChild(nxt);
  setTimeout(()=>fb.scrollIntoView({behavior:'smooth',block:'nearest'}),60);
}

async function saveProgress() {
  if (isRetry) return;
  const prog = await dbGet('prog_'+sec) || {done:0,wrong:[],qi:0,wrongNums:[]};
  sessionAnswered.forEach(num=>{
    if(wrongItems.find(w=>w.num===num)) {
      if(!prog.wrongNums.includes(num)) prog.wrongNums.push(num);
    } else {
      prog.wrongNums = (prog.wrongNums||[]).filter(n=>n!==num);
    }
  });
  prog.done = Math.min(answered, TOTALS[sec]);
  prog.qi = qi;
  prog.score = score;
  prog.answered = answered;
  prog.wrong = prog.wrongNums || [];
  dbSet('prog_'+sec, prog);
  updateHome();
}

function showResult() {
  show('result');
  const pct=answered?Math.round(score/answered*100):0;
  document.getElementById('resSub').textContent=LABELS[sec];
  const circ=2*Math.PI*58;
  document.getElementById('donutC').style.strokeDashoffset=circ*(1-pct/100);
  document.getElementById('donutPct').textContent=pct+'%';
  document.getElementById('sCorrect').textContent=score;
  document.getElementById('sWrong').textContent=answered-score;
  document.getElementById('sTotal').textContent=answered;
  const wb=document.getElementById('wrongBody'); wb.innerHTML='';
  if(!wrongItems.length) {
    wb.innerHTML='<div style="color:var(--text-dim);font-size:.85rem">全對！</div>';
  } else {
    wrongItems.forEach(w=>{
      const d=document.createElement('div'); d.className='wrong-item';
      d.innerHTML='<strong>第 '+w.num+' 題</strong>　'+w.stem;
      wb.appendChild(d);
    });
  }
  window.scrollTo(0,0);
}

function show(id) {
  ['home','quiz','result'].forEach(i=>document.getElementById(i).style.display=i===id?'block':'none');
}
function goHome() { show('home'); updateHome(); }

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

updateHome();
</script>
</body>
